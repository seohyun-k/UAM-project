<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAM Trajectory Visualization</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
  
  #header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; white-space: nowrap; }
  
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex: 1;
  }
  
  button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  button:hover { background: #30363d; border-color: #8b949e; }
  button.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
  button.play-btn { background: #238636; border-color: #2ea043; padding: 6px 18px; font-weight: 600; }
  button.play-btn:hover { background: #2ea043; }
  button.play-btn.paused { background: #1f6feb; border-color: #388bfd; }
  button.stop-btn { background: #da3633; border-color: #f85149; }
  button.stop-btn:hover { background: #f85149; }
  
  .speed-control { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .speed-control input { width: 100px; accent-color: #388bfd; }
  
  #progress-bar-container {
    background: #21262d;
    border-radius: 4px;
    height: 6px;
    width: 200px;
    cursor: pointer;
    position: relative;
  }
  #progress-bar {
    background: #388bfd;
    height: 100%;
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s;
  }
  
  #map { flex: 1; }
  
  #legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    background: rgba(13,17,23,0.92);
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 16px;
    z-index: 1000;
    min-width: 200px;
    max-height: 80vh;
    overflow-y: auto;
  }
  #legend h3 { font-size: 12px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-section { margin-bottom: 10px; }
  .legend-section-title { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 3px 0;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    transition: background 0.1s;
  }
  .legend-item:hover { background: #21262d; }
  .legend-item.hidden { opacity: 0.35; }
  .legend-line {
    width: 28px;
    height: 3px;
    border-radius: 2px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-label { font-size: 12px; }

  .status-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8b949e;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3fb950;
  }
  .status-dot.idle { background: #8b949e; }
  .status-dot.running { background: #3fb950; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .filter-btns { display: flex; gap: 6px; align-items: center; }
</style>
</head>
<body>

<div id="header">
  <h1>🚁 UAM Trajectory Map</h1>
  <div class="controls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="stop-btn" onclick="stopAnim()">■ Reset</button>
    <div id="progress-bar-container" onclick="seekProgress(event)">
      <div id="progress-bar"></div>
    </div>
    <div class="speed-control">
      <span>Speed:</span>
      <input type="range" id="speedSlider" min="1" max="50" value="10" oninput="updateSpeed(this.value)">
      <span id="speedLabel">10x</span>
    </div>
    <div class="status-info">
      <div class="status-dot idle" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
  </div>
  <div class="filter-btns">
    <button id="filterAll" class="active" onclick="filterTracks('all')">All (14)</button>
    <button id="filterXplane" onclick="filterTracks('xplane')">X-Plane (10)</button>
    <button id="filterPx4" onclick="filterTracks('px4')">PX4 (4)</button>
  </div>
</div>

<div id="map"></div>

<div id="legend">
  <h3>Trajectories</h3>

  </div>
  <div class="legend-section">
    <div class="legend-section-title">🔧 PX4 SIL</div>
    <div id="legend-px4"></div>
  </div>
</div>

  const latlngs = t.coords.map(c => [c[0], c[1]]);
  t.layer = L.polyline(latlngs, {
    color: t.color,
    weight: t.type === 'px4' ? 2.5 : 1.8,
    opacity: 0.35,
    dashArray: t.type === 'px4' ? null : '6,4'
  }).addTo(map);
  t.layer.bindTooltip(t.label, { sticky: true, className: '' });
});

// Legend
function buildLegend() {
  const xEl = document.getElementById('legend-xplane');
  const pEl = document.getElementById('legend-px4');
  xEl.innerHTML = ''; pEl.innerHTML = '';
  tracks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'legend-item' + (t.visible ? '' : ' hidden');
    el.innerHTML = `<div class="legend-line" style="background:${t.color};opacity:${t.type==='xplane'?0.8:1}"></div><span class="legend-label">${t.label}</span>`;
    el.onclick = () => toggleTrack(i);
    (t.type === 'xplane' ? xEl : pEl).appendChild(el);
    t.legendEl = el;
  });
}
buildLegend();

function toggleTrack(idx) {
  const t = tracks[idx];
  t.visible = !t.visible;
  if (t.visible) { map.addLayer(t.layer); t.legendEl.classList.remove('hidden'); }
  else { map.removeLayer(t.layer); t.legendEl.classList.add('hidden'); }
}

function filterTracks(type) {
  tracks.forEach((t, i) => {
    const shouldShow = type === 'all' || t.type === type;
    if (shouldShow !== t.visible) toggleTrack(i);
  });
  ['filterAll','filterXplane','filterPx4'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('filter' + (type === 'all' ? 'All' : type === 'xplane' ? 'Xplane' : 'Px4')).classList.add('active');
}

// Animation
let animFrame = null;
let animProgress = 0; // 0 to 1
let isPlaying = false;
let speedMultiplier = 10;
let lastTime = null;

// Animated dots and trails
const animDots = [];
const animTrails = [];
tracks.forEach(t => {
  const dot = L.circleMarker([t.coords[0][0], t.coords[0][1]], {
    radius: t.type === 'px4' ? 8 : 6,
    color: '#fff',
    weight: 1.5,
    fillColor: t.color,
    fillOpacity: 1,
    opacity: 0
  }).addTo(map);
  animDots.push(dot);
  
  const trail = L.polyline([], {
    color: t.color,
    weight: t.type === 'px4' ? 3 : 2,
    opacity: 0.9
  }).addTo(map);
  animTrails.push(trail);
});

function getCoordAtProgress(coords, progress) {
  const n = coords.length;
  const pos = progress * (n - 1);
  const i = Math.min(Math.floor(pos), n - 2);
  const frac = pos - i;
  const lat = coords[i][0] + (coords[i+1][0] - coords[i][0]) * frac;
  const lon = coords[i][1] + (coords[i+1][1] - coords[i][1]) * frac;
  return [lat, lon];
}

function getTrailCoords(coords, progress, trailLen = 30) {
  const n = coords.length;
  const pos = progress * (n - 1);
  const endI = Math.min(Math.floor(pos), n - 1);
  const startI = Math.max(0, endI - trailLen);
  return coords.slice(startI, endI + 1).map(c => [c[0], c[1]]);
}

function renderFrame(progress) {
  tracks.forEach((t, i) => {
    if (!t.visible) {
      animDots[i].setStyle({ opacity: 0, fillOpacity: 0 });
      animTrails[i].setLatLngs([]);
      return;
    }
    const pos = getCoordAtProgress(t.coords, progress);
    animDots[i].setLatLng(pos);
    animDots[i].setStyle({ opacity: 1, fillOpacity: 1 });
    
    const trail = getTrailCoords(t.coords, progress, 40);
    animTrails[i].setLatLngs(trail);
  });
  
  document.getElementById('progress-bar').style.width = (progress * 100) + '%';
  const pct = (progress * 100).toFixed(0);
  document.getElementById('statusText').textContent = `Playing ${pct}%`;
}

function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  
  animProgress += dt * speedMultiplier / 100;
  if (animProgress >= 1) {
    animProgress = 1;
    renderFrame(animProgress);
    stopAnim();
    document.getElementById('statusText').textContent = 'Complete';
    return;
  }
  
  renderFrame(animProgress);
  animFrame = requestAnimationFrame(animate);
}

function togglePlay() {
  if (isPlaying) {
    pauseAnim();
  } else {
    startAnim();
  }
}

function startAnim() {
  isPlaying = true;
  lastTime = null;
  document.getElementById('playBtn').textContent = '⏸ Pause';
  document.getElementById('playBtn').classList.add('paused');
  document.getElementById('statusDot').className = 'status-dot running';
  // Make static paths more transparent
  tracks.forEach(t => t.layer.setStyle({ opacity: 0.15 }));
  animFrame = requestAnimationFrame(animate);
}

function pauseAnim() {
  isPlaying = false;
  cancelAnimationFrame(animFrame);
  lastTime = null;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').classList.remove('paused');
  document.getElementById('statusDot').className = 'status-dot idle';
  document.getElementById('statusText').textContent = 'Paused';
}

function stopAnim() {
  isPlaying = false;
  cancelAnimationFrame(animFrame);
  animProgress = 0;
  lastTime = null;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').classList.remove('paused');
  document.getElementById('statusDot').className = 'status-dot idle';
  document.getElementById('statusText').textContent = 'Ready';
  document.getElementById('progress-bar').style.width = '0%';
  tracks.forEach(t => t.layer.setStyle({ opacity: 0.35 }));
  animDots.forEach(d => d.setStyle({ opacity: 0, fillOpacity: 0 }));
  animTrails.forEach(tr => tr.setLatLngs([]));
}

function seekProgress(e) {
  const bar = document.getElementById('progress-bar-container');
  const rect = bar.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  animProgress = p;
  renderFrame(p);
  if (!isPlaying) {
    document.getElementById('statusText').textContent = `Paused ${(p*100).toFixed(0)}%`;
    tracks.forEach(t => t.layer.setStyle({ opacity: 0.15 }));
    animDots.forEach(d => d.setStyle({ opacity: 1, fillOpacity: 1 }));
  }
}

function updateSpeed(val) {
  speedMultiplier = parseInt(val);
  document.getElementById('speedLabel').textContent = val + 'x';
}
</script>
</body>
