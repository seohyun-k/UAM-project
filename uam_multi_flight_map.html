<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAM Multi-Flight Trajectory</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#080b14; color:#e8eaf0; font-family:'Space Mono',monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  #header {
    padding:12px 20px;
    background:#0d0f1a;
    border-bottom:1px solid #1a1f35;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; color:#ffffff; letter-spacing:0.06em; }
  .logo span { color:#00d4ff; }
  .header-right { display:flex; align-items:center; gap:20px; }
  .h-stat { text-align:right; }
  .h-stat-l { font-size:9px; color:#3d4460; letter-spacing:0.15em; text-transform:uppercase; }
  .h-stat-v { font-size:12px; font-weight:700; color:#c8cce0; }

  #map { flex:1; z-index:1; }

  /* 사이드바 */
  #sidebar {
    position:absolute; top:62px; left:14px; z-index:1000;
    width:220px;
    background:rgba(10,12,20,0.93);
    border:1px solid #1a1f35; border-radius:10px;
    padding:14px;
    backdrop-filter:blur(14px);
  }
  .sb-title {
    font-family:'Syne',sans-serif; font-size:10px; font-weight:600;
    color:#3d4460; letter-spacing:0.18em; text-transform:uppercase;
    margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #1a1f35;
  }

  .flight-item {
    display:flex; align-items:center; gap:9px;
    padding:7px 8px; border-radius:6px; cursor:pointer;
    transition:background 0.15s;
    margin-bottom:3px;
    border:1px solid transparent;
  }
  .flight-item:hover { background:rgba(255,255,255,0.04); }
  .flight-item.active { border-color:var(--fc); background:rgba(255,255,255,0.05); }
  .flight-item.hidden-flight { opacity:0.35; }

  .dot {
    width:10px; height:10px; border-radius:50%; flex-shrink:0;
    box-shadow: 0 0 6px var(--fc);
  }
  .flight-label {
    font-size:12px; font-weight:700; flex:1;
  }
  .flight-pts {
    font-size:9px; color:#3d4460;
  }
  .eye-btn {
    font-size:11px; color:#3d4460; cursor:pointer;
    background:none; border:none; padding:0; line-height:1;
    transition:color 0.15s;
  }
  .eye-btn:hover { color:#c8cce0; }

  /* 재생 패널 */
  #playbar {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:1000;
    background:rgba(10,12,20,0.95);
    border:1px solid #1a1f35; border-radius:32px;
    padding:10px 22px;
    backdrop-filter:blur(14px);
    display:flex; align-items:center; gap:14px;
    min-width:360px;
  }
  #playBtn {
    width:32px; height:32px; border-radius:50%;
    background:#00d4ff; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background 0.2s;
  }
  #playBtn:hover { background:#00b8e6; }
  #playBtn svg { fill:#080b14; }
  #timeSlider {
    flex:1; -webkit-appearance:none; height:3px;
    border-radius:2px; background:#1a1f35; outline:none; cursor:pointer;
  }
  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance:none; width:13px; height:13px;
    border-radius:50%; background:#00d4ff; cursor:pointer;
  }
  #timeLabel { font-size:11px; color:#4a5170; min-width:60px; text-align:right; flex-shrink:0; }

  /* 현재 위치 정보 */
  #infobox {
    position:absolute; bottom:24px; right:14px; z-index:1000;
    background:rgba(10,12,20,0.93);
    border:1px solid #1a1f35; border-radius:10px;
    padding:14px 16px; backdrop-filter:blur(14px);
    min-width:180px;
  }
  .ib-title { font-family:'Syne',sans-serif; font-size:10px; color:#3d4460; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:10px; }
  .ib-row { display:flex; justify-content:space-between; font-size:11px; padding:4px 0; border-bottom:1px solid #10131f; }
  .ib-row:last-child { border-bottom:none; }
  .ib-k { color:#4a5170; }
  .ib-v { color:#c8cce0; font-weight:700; }

  .leaflet-popup-content-wrapper {
    background:rgba(10,12,20,0.96)!important;
    border:1px solid #1a1f35!important; border-radius:8px!important;
    color:#e8eaf0!important; font-family:'Space Mono',monospace!important;
    font-size:11px!important; box-shadow:0 8px 24px rgba(0,0,0,0.6)!important;
  }
  .leaflet-popup-tip { background:#1a1f35!important; }
  .leaflet-popup-content { margin:10px 14px!important; line-height:1.9!important; }
</style>
</head>

<div id="map"></div>

<div id="sidebar">

const map = L.map('map', { center:[37.535, 126.93], zoom:12 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

const STEP = 4;
const flightState = FLIGHTS.map((f, i) => {
  // 경로선 그리기
  const polylines = [];
  for (let j = 0; j < f.points.length - STEP; j += STEP) {
    const seg = f.points.slice(j, j + STEP + 1);
    const lls = seg.map(p => [p[1], p[2]]);
    const pl = L.polyline(lls, { color: f.color, weight: 2.5, opacity: 0.75 }).addTo(map);
    polylines.push(pl);
  }

  // 출발 마커
  const startPt = f.points[0];
  const startIcon = L.divIcon({
    html: `<div style="width:10px;height:10px;border-radius:50%;background:${f.color};border:2px solid #fff;box-shadow:0 0 8px ${f.color};"></div>`,
    className:'', iconAnchor:[5,5]
  });
  L.marker([startPt[1], startPt[2]], {icon:startIcon}).addTo(map)
    .bindPopup(`<b style="color:${f.color}">✈ ${f.label} 출발</b>`);

  // 이동 마커
  const planeIcon = L.divIcon({
    html: `<div style="width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid ${f.color};box-shadow:0 0 12px ${f.color}88;transform:translate(-50%,-50%)"></div>`,
    className:'', iconAnchor:[0,0]
  });
  const planeMarker = L.marker([startPt[1], startPt[2]], {icon:planeIcon, zIndexOffset:1000}).addTo(map);

  return { polylines, planeMarker, visible: true, curIdx: 0 };
});

// 사이드바 렌더
const flightList = document.getElementById('flight-list');
FLIGHTS.forEach((f, i) => {
  const item = document.createElement('div');
  item.className = 'flight-item active';
  item.style.setProperty('--fc', f.color);
  item.id = `fi-${i}`;
  item.innerHTML = `
    <div class="dot" style="background:${f.color};--fc:${f.color}"></div>
    <span class="flight-label" style="color:${f.color}">✈ ${f.label}</span>
    <span class="flight-pts">${f.points.length}pts</span>
    <button class="eye-btn" id="eye-${i}" onclick="toggleFlight(${i},event)">👁</button>
  `;
  flightList.appendChild(item);
});

function toggleFlight(i, e) {
  e.stopPropagation();
  const state = flightState[i];
  state.visible = !state.visible;
  const item = document.getElementById(`fi-${i}`);
  const eye = document.getElementById(`eye-${i}`);
  
  state.polylines.forEach(pl => state.visible ? map.addLayer(pl) : map.removeLayer(pl));
  state.visible ? map.addLayer(state.planeMarker) : map.removeLayer(state.planeMarker);
  
  item.classList.toggle('hidden-flight', !state.visible);
  item.classList.toggle('active', state.visible);
  eye.textContent = state.visible ? '👁' : '🚫';
  
  const vis = flightState.filter(s => s.visible).length;
  document.getElementById('ib-visible').textContent = vis + '편';
}

// 애니메이션
let playing = false, animTimer = null, curPct = 0;

function updateAll(pct) {
  curPct = pct;
  FLIGHTS.forEach((f, i) => {
    if (!flightState[i].visible) return;
    const idx = Math.min(f.points.length - 1, Math.floor(pct / 100 * (f.points.length - 1)));
    const p = f.points[idx];
    flightState[i].planeMarker.setLatLng([p[1], p[2]]);
  });
  document.getElementById('timeSlider').value = Math.round(pct * 10);
  document.getElementById('timeLabel').textContent = pct.toFixed(1) + '%';
  document.getElementById('ib-pct').textContent = pct.toFixed(1) + '%';
}

function step() {
  curPct += 0.08;
  if (curPct >= 100) {
    curPct = 100;
    playing = false;
    document.getElementById('playIcon').innerHTML = '<polygon points="0,0 12,7 0,14"/>';
    updateAll(100);
    return;
  }
  updateAll(curPct);
  animTimer = requestAnimationFrame(step);
}

function togglePlay() {
  playing = !playing;
  if (playing) {
    if (curPct >= 100) curPct = 0;
    document.getElementById('playIcon').innerHTML = '<rect x="0" y="0" width="4" height="14"/><rect x="8" y="0" width="4" height="14"/>';
    animTimer = requestAnimationFrame(step);
  } else {
    cancelAnimationFrame(animTimer);
    document.getElementById('playIcon').innerHTML = '<polygon points="0,0 12,7 0,14"/>';
  }
}

function seekPct(val) {
  curPct = val / 10;
  if (playing) { cancelAnimationFrame(animTimer); animTimer = requestAnimationFrame(step); }
  else updateAll(curPct);
}

updateAll(0);
</script>
