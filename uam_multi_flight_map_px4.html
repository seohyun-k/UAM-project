<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAM Multi-Flight Trajectory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --panel: rgba(14, 18, 28, 0.92);
            --border: rgba(255,255,255,0.08);
            --accent1: #00d4ff;  /* flight 1 - cyan */
            --accent2: #ff6b35;  /* flight 2 - orange */
            --accent3: #7eff6e;  /* flight 3 - green */
            --accent4: #bf5fff;  /* flight 4 - purple */
            --text: #e8eaf0;
            --muted: rgba(232,234,240,0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        #map {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* Header */
        #header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 40px;
            text-align: center;
            white-space: nowrap;
        }

        #header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent1);
        }

        #header .subtitle {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            letter-spacing: 0.1em;
        }

        /* Legend / Flight Info Panel */
        #legend {
            position: absolute;
            top: 90px;
            left: 20px;
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px;
            min-width: 200px;
        }

        #legend h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .flight-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .flight-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .flight-item.active {
            border-color: var(--border);
            background: rgba(255,255,255,0.04);
        }

        .flight-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        .flight-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            flex: 1;
        }

        .flight-date {
            font-size: 10px;
            color: var(--muted);
        }

        .flight-toggle {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.2s;
        }

        .flight-item.hidden .flight-toggle {
            background: transparent;
        }

        .flight-item:not(.hidden) .flight-toggle::after {
            content: '✓';
        }

        /* Stats Panel */
        #stats {
            position: absolute;
            top: 90px;
            right: 20px;
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px;
            min-width: 180px;
        }

        #stats h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
        }

        /* Playback controls */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 500px;
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent1), var(--accent4));
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        .ctrl-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent1);
        }

        #time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            min-width: 100px;
            text-align: center;
        }

        /* Altitude indicator */
        #alt-bar {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 12px;
            width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #alt-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            writing-mode: horizontal-tb;
            text-align: center;
        }

        /* Animated aircraft markers */
        .aircraft-icon {
            font-size: 18px;
            line-height: 1;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.5));
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }

        /* Leaflet overrides */
        .leaflet-control-zoom {
            border: 1px solid var(--border) !important;
            background: var(--panel) !important;
            backdrop-filter: blur(10px);
        }

        .leaflet-control-zoom a {
            color: var(--text) !important;
            background: transparent !important;
        }

        .leaflet-control-attribution {
            background: rgba(10,12,16,0.7) !important;
            color: var(--muted) !important;
            font-size: 10px !important;
        }

        .leaflet-control-attribution a {
            color: var(--accent1) !important;
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        #loading h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.3em;
            color: var(--accent1);
            margin-bottom: 16px;
        }

        .loader {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 1px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent1), var(--accent4));
            animation: load 1.5s ease forwards;
        }

        @keyframes load {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

<div id="loading">
    <h2>UAM TRAJECTORY LOADING</h2>
    <div class="loader"><div class="loader-fill"></div></div>
</div>

<div id="map"></div>

<div id="header">
    <h1>UAM Multi-Flight Trajectory</h1>
    <div class="subtitle">Gimpo Area · 4 Flights · X-Plane Simulation Data</div>
</div>

<div id="legend">
    <h3>Flight Paths</h3>
    <div class="flight-item active" id="fi-1" onclick="toggleFlight(1)">
        <div class="flight-dot" style="background:#00d4ff; color:#00d4ff;"></div>
        <div>
            <div class="flight-label" style="color:#00d4ff">Flight 1</div>
            <div class="flight-date">2026-02-21 #1</div>

        <div class="flight-toggle"></div>
    </div>
    <div class="flight-item active" id="fi-2" onclick="toggleFlight(2)">
        <div class="flight-dot" style="background:#ff6b35; color:#ff6b35;"></div>
        <div>
            <div class="flight-label" style="color:#ff6b35">Flight 2</div>
            <div class="flight-date">2026-02-21 #2</div>
        </div>
        <div class="flight-toggle"></div>
    </div>
    <div class="flight-item active" id="fi-3" onclick="toggleFlight(3)">
        <div class="flight-dot" style="background:#7eff6e; color:#7eff6e;"></div>

            <div class="flight-label" style="color:#7eff6e">Flight 3</div>

    </div>
    <div class="flight-item active" id="fi-4" onclick="toggleFlight(4)">

        <div>
            <div class="flight-label" style="color:#bf5fff">Flight 4</div>
            <div class="flight-date">2026-02-22</div>
        </div>
        <div class="flight-toggle"></div>
    </div>
</div>

<div id="stats">
    <h3>Statistics</h3>
    <div class="stat-row">
        <span class="stat-label">총 비행 수</span>
        <span class="stat-value" style="color:#00d4ff">4</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">진행률</span>
        <span class="stat-value" id="prog-pct">0.0%</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">현재 고도</span>
        <span class="stat-value" id="cur-alt">—</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">데이터 포인트</span>
        <span class="stat-value" style="color:#7eff6e">2,400</span>
    </div>
</div>

<div id="controls">
    <button class="ctrl-btn" onclick="resetAnimation()" title="처음으로">⏮</button>
    <button class="ctrl-btn" id="play-btn" onclick="togglePlay()" title="재생/일시정지">▶</button>
    <button class="ctrl-btn" onclick="changeSpeed()" title="속도 변경" id="speed-btn">1×</button>
    <div id="progress-bar" onclick="seekProgress(event)">
        <div id="progress-fill"></div>
    </div>
    <div id="time-display">t = 0.0s</div>
</div>

6, 952.094], [37.51933288574219, 127.07210540771484, 83.02227020263672, 953.587], [37.51933288574219, 127.07210540771484, 81.95542907714844, 955.026], [37.51933288574219, 127.07210540771484, 81.09296417236328, 956.352], [37.51933288574219, 127.07211303710938, 80.68643188476562, 957.806], [37.51933288574219, 127.07210540771484, 79.94903564453125, 959.307], [37.51933288574219, 127.07210540771484, 78.5728759765625, 961.006], [37.51933288574219, 127.07211303710938, 76.21343231201172, 962.551], [37.51933288574219, 127.07211303710938, 74.25729370117188, 964.079], [37.51932907104492, 127.07210540771484, 73.55171203613281, 965.43], [37.519325256347656, 127.07209777832033, 73.5759048461914, 966.891], [37.51932144165039, 127.07209014892578, 73.3066635131836, 968.313], [37.51932144165039, 127.07209014892578, 73.06632995605469, 969.773], [37.519325256347656, 127.07209014892578, 73.05432891845703, 971.279], [37.51933288574219, 127.07209777832033, 73.02489471435547, 972.627], [37.51933670043945, 127.07210540771484, 72.00870513916016, 974.244], [37.51935958862305, 127.07212829589844, 71.11536407470703, 975.895], [37.51938247680664, 127.0721435546875, 68.87647247314453, 977.373], [37.5193977355957, 127.07215118408205, 65.7935562133789, 979.033], [37.5193977355957, 127.07215118408205, 62.51526641845703, 980.703], [37.51939392089844, 127.07215118408205, 59.25178527832031, 982.241], [37.51939010620117, 127.0721435546875, 56.210693359375, 983.818], [37.519378662109375, 127.0721435546875, 53.26033401489258, 985.367], [37.51936340332031, 127.07213592529295, 48.824249267578125, 986.972], [37.51934814453125, 127.0721206665039, 43.71653366088867, 988.575], [37.51933670043945, 127.07211303710938, 38.61006164550781, 990.188], [37.51933288574219, 127.07211303710938, 33.55255508422852, 991.676], [37.51933670043945, 127.07211303710938, 26.409130096435547, 993.317], [37.51933670043945, 127.0721206665039, 18.908740997314453, 994.941], [37.51934814453125, 127.07212829589844, 15.702327728271484, 996.565], [37.51935195922852, 127.07212829589844, 15.766645431518556, 998.161], [37.51937103271485, 127.0721435546875, 15.769947052001951, 999.745]]};

const COLORS = {
    flight1: '#00d4ff',
    flight2: '#ff6b35',
    flight3: '#7eff6e',
    flight4: '#bf5fff'
};

const FLIGHT_LABELS = {
    flight1: 'Flight 1',
    flight2: 'Flight 2',
    flight3: 'Flight 3',
    flight4: 'Flight 4'
};

// ===== MAP INIT =====
const map = L.map('map', {
    center: [37.58, 126.82],
    zoom: 12,
    zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// ===== DRAW FULL PATHS =====
const polylines = {};
const visibilityState = { flight1: true, flight2: true, flight3: true, flight4: true };

Object.keys(FLIGHTS_DATA).forEach(key => {
    const coords = FLIGHTS_DATA[key].map(d => [d[0], d[1]]);
    const color = COLORS[key];
    const poly = L.polyline(coords, {
        color: color,
        weight: 2.5,
        opacity: 0.5,
        dashArray: null
    }).addTo(map);
    polylines[key] = poly;
});

// ===== ANIMATED PATHS =====
const animPolylines = {};
Object.keys(FLIGHTS_DATA).forEach(key => {
    const poly = L.polyline([], {
        color: COLORS[key],
        weight: 3.5,
        opacity: 0.9
    }).addTo(map);
    animPolylines[key] = poly;
});

// ===== AIRCRAFT MARKERS =====
const markers = {};
Object.keys(FLIGHTS_DATA).forEach(key => {
    const color = COLORS[key];
    const icon = L.divIcon({
        html: `<div style="font-size:20px;line-height:1;filter:drop-shadow(0 0 8px ${color});">✈</div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
        className: ''
    });
    const firstPt = FLIGHTS_DATA[key][0];
    const marker = L.marker([firstPt[0], firstPt[1]], { icon }).addTo(map);
    markers[key] = marker;
});

// ===== START/END MARKERS =====
Object.keys(FLIGHTS_DATA).forEach(key => {
    const data = FLIGHTS_DATA[key];
    const color = COLORS[key];
    const label = FLIGHT_LABELS[key];

    // Start marker
    const startIcon = L.divIcon({
        html: `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 0 10px ${color};"></div>`,
        iconSize: [10, 10], iconAnchor: [5, 5], className: ''
    });
    L.marker([data[0][0], data[0][1]], { icon: startIcon })
      .bindTooltip(`${label} 출발`, {permanent: false, direction: 'top'})
      .addTo(map);

    // End marker
    const endIcon = L.divIcon({
        html: `<div style="width:10px;height:10px;border-radius:50%;background:white;border:2px solid ${color};box-shadow:0 0 10px ${color};"></div>`,
        iconSize: [10, 10], iconAnchor: [5, 5], className: ''
    });
    L.marker([data[data.length-1][0], data[data.length-1][1]], { icon: endIcon })
      .bindTooltip(`${label} 도착`, {permanent: false, direction: 'top'})
      .addTo(map);
});

// ===== ANIMATION =====
let isPlaying = false;
let animFrame = null;
let progress = 0; // 0 to 1
let speed = 1;
const SPEEDS = [0.5, 1, 2, 5];
let speedIdx = 1;
let lastTime = null;

// Total duration (virtual seconds to show full animation)
const ANIM_DURATION = 30000; // ms for full playback at 1x

function updateAnimation(progress) {
    Object.keys(FLIGHTS_DATA).forEach(key => {
        if (!visibilityState[key]) return;
        const data = FLIGHTS_DATA[key];
        const endIdx = Math.floor(progress * (data.length - 1));
        const pts = data.slice(0, endIdx + 1).map(d => [d[0], d[1]]);
        animPolylines[key].setLatLngs(pts);

        if (endIdx >= 0) {
            const cur = data[endIdx];
            const icon = L.divIcon({
                html: `<div style="font-size:20px;line-height:1;filter:drop-shadow(0 0 8px ${COLORS[key]});transform:rotate(${getHeading(data, endIdx)}deg);">✈</div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12],
                className: ''
            });
            markers[key].setLatLng([cur[0], cur[1]]);
            markers[key].setIcon(icon);
        }
    });

    // Update UI
    document.getElementById('progress-fill').style.width = (progress * 100) + '%';
    document.getElementById('prog-pct').textContent = (progress * 100).toFixed(1) + '%';

    // Show current alt from flight1 (reference)
    const f1data = FLIGHTS_DATA.flight1;
    const idx = Math.floor(progress * (f1data.length - 1));
    if (idx >= 0 && idx < f1data.length) {
        document.getElementById('cur-alt').textContent = f1data[idx][2].toFixed(0) + ' m';
        const t = f1data[idx][3];
        document.getElementById('time-display').textContent = 't = ' + t.toFixed(1) + 's';
    }
}

function getHeading(data, idx) {
    if (idx <= 0 || idx >= data.length - 1) return 0;
    const p1 = data[idx - 1];
    const p2 = data[idx];
    const dy = p2[0] - p1[0];
    const dx = p2[1] - p1[1];
    return Math.atan2(dx, dy) * 180 / Math.PI;
}

function animLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;
    lastTime = timestamp;

    progress += (delta / ANIM_DURATION) * speed;
    if (progress >= 1) {
        progress = 1;
        updateAnimation(progress);
        isPlaying = false;
        document.getElementById('play-btn').textContent = '▶';
        return;
    }
    updateAnimation(progress);
    if (isPlaying) animFrame = requestAnimationFrame(animLoop);
}

function togglePlay() {
    isPlaying = !isPlaying;
    if (isPlaying) {
        document.getElementById('play-btn').textContent = '⏸';
        lastTime = null;
        animFrame = requestAnimationFrame(animLoop);
    } else {
        document.getElementById('play-btn').textContent = '▶';
        if (animFrame) cancelAnimationFrame(animFrame);
    }
}

function resetAnimation() {
    if (animFrame) cancelAnimationFrame(animFrame);
    isPlaying = false;
    progress = 0;
    lastTime = null;
    document.getElementById('play-btn').textContent = '▶';
    updateAnimation(0);
    Object.keys(animPolylines).forEach(key => animPolylines[key].setLatLngs([]));
}

function changeSpeed() {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    speed = SPEEDS[speedIdx];
    document.getElementById('speed-btn').textContent = speed + '×';
}

function seekProgress(e) {
    const bar = document.getElementById('progress-bar');
    const rect = bar.getBoundingClientRect();
    progress = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    updateAnimation(progress);
}

// ===== TOGGLE FLIGHTS =====
function toggleFlight(num) {
    const key = 'flight' + num;
    visibilityState[key] = !visibilityState[key];
    const item = document.getElementById('fi-' + num);

    if (visibilityState[key]) {
        item.classList.remove('hidden');
        polylines[key].addTo(map);
        animPolylines[key].addTo(map);
        markers[key].addTo(map);
    } else {
        item.classList.add('hidden');
        map.removeLayer(polylines[key]);
        map.removeLayer(animPolylines[key]);
        map.removeLayer(markers[key]);
    }
}

// ===== FIT MAP =====
const allCoords = [];
Object.values(FLIGHTS_DATA).forEach(data => {
    data.forEach(d => allCoords.push([d[0], d[1]]));
});
if (allCoords.length > 0) {
    map.fitBounds(L.latLngBounds(allCoords), { padding: [60, 60] });
}

// ===== HIDE LOADING =====
setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 500);
}, 1600);

// Init
updateAnimation(0);
</script>
